<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Someone Special ❤️</title>

<style>

body{
    margin:0;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg,#ff758c,#ff7eb3);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.container{
    text-align:center;
    background:rgba(0,0,0,0.3);
    padding:40px;
    border-radius:20px;
    width:350px;
}

button{
    padding:12px 25px;
    font-size:16px;
    border:none;
    border-radius:30px;
    background:white;
    color:#ff4d6d;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}

#message{
    margin-top:20px;
    font-size:18px;
}

.heart{
    position:absolute;
    color:white;
    font-size:20px;
    animation: float 6s linear infinite;
}

@keyframes float{
    0%{
        transform: translateY(100vh);
        opacity:1;
    }
    100%{
        transform: translateY(-10vh);
        opacity:0;
    }
}

</style>
</head>

<body>

<div class="container">

<h1 id="typing"></h1>

<p>You are someone very special to me ❤️</p>

<button onclick="showLove()">Click Me</button>

<p id="message"></p>

</div>

<script>

/* typing effect */

const text = "Hey my baby gurl krishu ❤️";
let i = 0;

function typeWriter(){
    if(i < text.length){
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter,80);
    }
}

typeWriter();

/* love messages */

const messages = [
"You make my life brighter.",
"I love your smile.",
"You mean more to me than you know.",
"I'm lucky to have you.",
"I want to keep making you smile.",
"Even when I mess up, I still care about you deeply."
];

function showLove(){
    const random = Math.floor(Math.random()*messages.length);
    document.getElementById("message").innerText = messages[random];
}

/* floating hearts */

function createHeart(){

    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";

    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (Math.random()*20 + 15) + "px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },6000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
